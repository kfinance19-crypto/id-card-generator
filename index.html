<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Card Generator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="container">

<div class="form-box">

    <h2>ID Card Generator</h2>

    <input type="text" id="name" placeholder="Agent Name">
    <input type="text" id="empid" placeholder="Employee ID">
    <input type="text" id="designation" placeholder="Designation">
    <input type="text" id="mobile" placeholder="Mobile Number">
    <input type="text" id="emergency" placeholder="Emergency Contact">
    <input type="file" id="photo" accept="image/*">

    <button onclick="generateCard()">Generate Card</button>
    <button id="downloadBtn">Download PDF</button>
    <button onclick="flipCard()">Show Front / Back</button>

</div>

<!-- CARD AREA -->
<div class="card-wrapper" id="cardArea">

    <div class="flip-card" id="flipCard">

        <!-- FRONT -->
        <div class="card front" id="frontCard">

            <div class="top-strip"></div>

            <img src="logo.png" class="logo">

            <h3>Credgeniee India Pvt. Ltd.</h3>

            <p class="tagline">Simplifying finance, amplifying growth</p>

            <img id="previewPhoto" class="photo">

            <h2 id="cardName">Agent Name</h2>

            <div id="cardId">EMP ID</div>

            <div id="cardDesignation" class="designation-badge"></div>

        </div>

        <!-- BACK -->
        <div class="card back" id="backCard">

            <div class="top-strip"></div>

            <img src="logo.png" class="logo back-logo">

            <div class="back-header">EMPLOYEE INFORMATION</div>

            <div class="info-value" id="backMobile"></div>
            <div class="info-value" id="backEmergency"></div>

        </div>

    </div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
